services:
  be-auth:
    build:
      context: ./be-auth
    ports:
      - "8881:8080"
    volumes:
      - ./opentelemetry-javaagent.jar:/app/opentelemetry-javaagent.jar:ro
    environment:
      JAVA_TOOL_OPTIONS: >-
        -javaagent:/app/opentelemetry-javaagent.jar
        -Dotel.service.name=be-auth
        -Dotel.metrics.exporter=otlp
        -Dotel.logs.exporter=otlp
        -Dotel.traces.exporter=otlp
        -Dotel.exporter.otlp.endpoint=http://192.168.122.46:4317
        -Dotel.exporter.otlp.protocol=grpc
    networks:
      - demo-net
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  kafka:
    image: apache/kafka:latest
    ports:
      - "9092:9092"   # Docker 내부 (be-* 서비스)
      - "9093:9093"   # 외부 로컬 접속용
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://:9092,EXTERNAL://:9093,CONTROLLER://:9094
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:9092,EXTERNAL://localhost:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9094
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    networks:
      - demo-net
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - demo-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  be-product:
    build:
      context: ./be-product
    ports:
      - "8882:8080"
    volumes:
      - ./opentelemetry-javaagent.jar:/app/opentelemetry-javaagent.jar:ro
    environment:
      REDIS_HOST: redis
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JAVA_TOOL_OPTIONS: >-
        -javaagent:/app/opentelemetry-javaagent.jar
        -Dotel.service.name=be-product
        -Dotel.metrics.exporter=otlp
        -Dotel.logs.exporter=otlp
        -Dotel.traces.exporter=otlp
        -Dotel.exporter.otlp.endpoint=http://192.168.122.46:4317
        -Dotel.exporter.otlp.protocol=grpc
        -Dotel.instrumentation.logback-appender.experimental.capture-mdc-attributes=guid,session.id,user.id,log_category,log_type
        -Dotel.instrumentation.logback-appender.experimental.capture-key-value-pair-attributes=true
    depends_on:
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - demo-net
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  be-subscription:
    build:
      context: ./be-subscription
    ports:
      - "8883:8080"
    volumes:
      - ./opentelemetry-javaagent.jar:/app/opentelemetry-javaagent.jar:ro
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      JAVA_TOOL_OPTIONS: >-
        -javaagent:/app/opentelemetry-javaagent.jar
        -Dotel.service.name=be-subscription
        -Dotel.metrics.exporter=otlp
        -Dotel.logs.exporter=otlp
        -Dotel.traces.exporter=otlp
        -Dotel.exporter.otlp.endpoint=http://192.168.122.46:4317
        -Dotel.exporter.otlp.protocol=grpc
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - demo-net
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  be-bff:
    build:
      context: ./be-bff
    ports:
      - "8880:8080"
    volumes:
      - ./opentelemetry-javaagent.jar:/app/opentelemetry-javaagent.jar:ro
    environment:
      SERVICES_AUTH_URL: http://be-auth:8080
      SERVICES_PRODUCT_URL: http://be-product:8080
      SERVICES_SUBSCRIPTION_URL: http://be-subscription:8080
      JAVA_TOOL_OPTIONS: >-
        -javaagent:/app/opentelemetry-javaagent.jar
        -Dotel.service.name=be-bff
        -Dotel.metrics.exporter=otlp
        -Dotel.logs.exporter=otlp
        -Dotel.traces.exporter=otlp
        -Dotel.exporter.otlp.endpoint=http://192.168.122.46:4317
        -Dotel.exporter.otlp.protocol=grpc
    networks:
      - demo-net
    depends_on:
      be-auth:
        condition: service_healthy
      be-product:
        condition: service_healthy
      be-subscription:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-s", "-o", "/dev/null", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s

  fe-web:
    build:
      context: ./fe-web
    ports:
      - "3000:80"
    environment:
      BFF_URL: http://be-bff:8080
      OTEL_COLLECTOR_URL: http://192.168.122.46:4318
      VITE_SERVICE_NAME: fe-web
      VITE_SERVICE_VERSION: 0.0.1
      VITE_DEPLOYMENT_ENV: production
      VITE_OTLP_TRACES_PATH: /v1/traces
    networks:
      - demo-net
    depends_on:
      be-bff:
        condition: service_healthy

networks:
  demo-net:
    driver: bridge